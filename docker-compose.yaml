version: "3.9"

services:
  flask:
    build: ./tools
    container_name: flask
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/weather"]
      interval: 5s
      timeout: 3s
      retries: 5

  node:
    build: ./webservice
    container_name: webservice
    ports:
      - "5500:5500"
    depends_on:
      flask:
        condition: service_healthy