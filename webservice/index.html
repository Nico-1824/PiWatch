<!DOCTYPE html>
<html>

    <head>
        <title>PiWatch</title>
        <link rel="stylesheet" href="styles.css"/>
        <script src="client.js" defer></script>
    </head>

    <body>
        
        <header>
            <h1>PiWatch</h1>
            <h2>Your School Monitoring System</h2>
            
            <div class="scroll-view">
                <!-- Will scroll horizontally data if there is more than certian column length -->
                <!-- Display imporant data like weather, traffic levels, and crime activity -->
                 
            </div>

        </header>

        <main>
            <div class="chat-room">
                <!-- Display a chat box for students to talk about things going on aroung campus -->
                <div class="chat-box">
                    
                </div>
                <form class="chat-input">
                    <input type="text" placeholder="Start chatting here..."/>
                </form>
            </div>
        </main>

    </body>

</html>
